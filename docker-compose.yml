# Ephemeral local WordPress + WooCommerce environment for Vortem AI plugin testing.
#
# Usage:
#   bin/dev up      → boot stack, install WP+WC, activate vortem-ai. Visit http://localhost:8088
#   bin/dev down    → full teardown (removes wp_core volume; DB is tmpfs)
#   bin/dev wp …    → run any wp-cli command (e.g. bin/dev wp plugin list)
#
# Direct equivalents (no wrapper):
#   docker compose up -d --wait
#   docker compose down -v

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_RANDOM_ROOT_PASSWORD: '1'
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      start_period: 5s
      interval: 3s
      timeout: 2s
      retries: 30

  wp:
    image: wordpress:php8.1-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: '1'
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
    ports:
      - "8088:80"
    volumes:
      - wp_core:/var/www/html
      - ./:/var/www/html/wp-content/plugins/vortem-ai
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/wp-config.php"]
      interval: 2s
      timeout: 1s
      retries: 60

  cli:
    image: wordpress:cli-php8.1
    depends_on:
      wp:
        condition: service_healthy
      db:
        condition: service_healthy
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_core:/var/www/html
      - ./:/var/www/html/wp-content/plugins/vortem-ai
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if ! wp core is-installed 2>/dev/null; then
          echo "→ Installing WordPress…"
          wp core install \
            --url=http://localhost:8088 \
            --title="Vortem Dev" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=admin@example.com \
            --skip-email
          echo "→ Installing + activating WooCommerce…"
          wp plugin install woocommerce --activate
          echo "→ Installing + activating Plugin Check (wp.org review bot)…"
          wp plugin install plugin-check --activate
          echo "→ Installing + activating Query Monitor (debug panel)…"
          wp plugin install query-monitor --activate
          echo "→ Installing + activating Yoast SEO…"
          wp plugin install wordpress-seo --activate
          echo "→ Installing WordPress Importer (for sample data, not activated)…"
          wp plugin install wordpress-importer
          echo "→ Activating vortem-ai…"
          wp plugin activate vortem-ai
          wp option update permalink_structure '/%postname%/' >/dev/null
          wp rewrite flush --hard >/dev/null
        fi
        echo
        echo "  ✓ Ready: http://localhost:8088/wp-admin   (admin / admin)"
        echo "  Active: woocommerce, plugin-check, query-monitor, wordpress-seo, vortem-ai"
        echo "  → Run wp.org review:  bin/dev wp plugin check vortem-ai"
        echo

volumes:
  wp_core: {}
